<html>
<head>
<meta charset="UTF-8">
<title>Ohara Bunch</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f7f2ec;
margin:0;
padding:20px;
}

h1{
font-size:28px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:1fr;
gap:16px;
}

.card{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 4px 16px rgba(0,0,0,0.05);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
object-fit:cover;
}

.card-body{
padding:16px;
}

.price{
font-weight:700;
margin-top:6px;
}

button{
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
background:black;
color:white;
font-size:16px;
width:100%;
}
</style>

</head>

<body>

<h1>Ohara.Bunch 🌸</h1>

<div id="products" class="grid"></div>

<script>

const BASE_ID = "appR99ityFDyaQBNM"
const TABLE = "Products"
const VIEW = "Store"
const TOKEN = "patIoNIQLjygPpciX.02ccdc7ec3782e561cb23496502f4a75ace6a2d33d3192b7b8030dd66ef4897a"

const url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE}?view=${VIEW}`

async function loadProducts(){

const res = await fetch(url,{
headers:{
Authorization:`Bearer ${TOKEN}`
}
})

const data = await res.json()

const container = document.getElementById("products")

data.records.forEach(record=>{

const name = record.fields.Name
const price = record.fields["Price AED"]
const photo = record.fields.Photo?.[0]?.url

const card = document.createElement("div")
card.className="card"

card.innerHTML=`
<img src="${photo}">
<div class="card-body">
<div>${name}</div>
<div class="price">AED ${price}</div>
<button>Add to cart</button>
</div>
`

container.appendChild(card)

})

}

loadProducts()

</script>

</body>
</html>
